# Parameters for so101_perception/object_classifier node.
#
# This file is written automatically by the `hsv_calibrator` node when you
# press 'w' in its GUI, but the seed values below are good starting points
# for the two objects we have so far (red heart-bear plush and blue plush).
# The remaining four slots are placeholders disabled with `enabled: false`;
# calibrate them live and overwrite this file.
#
# OpenCV convention: H in [0, 179], S/V in [0, 255].
# If hsv_lower[0] > hsv_upper[0] the H range wraps around 0/180 — useful for
# reds, which sit at both ends of the hue circle.

object_classifier:
  ros__parameters:

    # ── TF bridge (copied from blue_detector_params.yaml) ─────────────────────
    parent_link: "moving_jaw_so101_v1_link"
    mount_x:   0.0
    mount_y:   0.0
    mount_z:  -0.227
    mount_qx: -0.7071
    mount_qy:  0.0
    mount_qz:  0.0
    mount_qw: -0.7071

    target_frame: "base_link"

    # ── Input topics ──────────────────────────────────────────────────────────
    color_image_topic: "/camera/cam_static/color/image_raw"
    depth_image_topic: "/camera/cam_static/aligned_depth_to_color/image_raw"
    camera_info_topic: "/camera/cam_static/color/camera_info"

    # ── Depth / detection quality ─────────────────────────────────────────────
    depth_scale: 0.001
    max_depth_m: 3.0
    marker_lifetime_s: 1.0

    # Published when no enabled class produces a contour above its min area.
    none_label: "none"

    # ── Per-class HSV ranges ──────────────────────────────────────────────────
    # The detection node iterates over this list and picks the class whose
    # mask produces the largest contour above its min_contour_area.  Set
    # `enabled: false` to skip a slot without removing it.
    classes:
    - label: red_heart_bear
      hsv_lower: [147, 117, 26]
      hsv_upper: [9, 255, 138]
      min_contour_area: 500
      enabled: true
    - label: blue_dragon
      hsv_lower: [63, 126, 150]
      hsv_upper: [165, 255, 255]
      min_contour_area: 500
      enabled: true
    - label: purple_cocodrile
      hsv_lower: [109, 40, 96]
      hsv_upper: [143, 207, 168]
      min_contour_area: 500
      enabled: true
    - label: banana
      hsv_lower: [0, 66, 136]
      hsv_upper: [81, 200, 233]
      min_contour_area: 500
      enabled: true
    - label: green_platypus
      hsv_lower: [70, 112, 30]
      hsv_upper: [95, 255, 149]
      min_contour_area: 500
      enabled: true
    - label: object_6
      enabled: false
      hsv_lower: [0, 0, 0]
      hsv_upper: [179, 255, 255]
      min_contour_area: 500
