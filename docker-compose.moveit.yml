services:
  moveit:
    build:
      context: .
      dockerfile: Dockerfile.moveit
    image: so101-moveit:latest
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      # Software rendering — required for RViz inside a container without GPU passthrough
      - LIBGL_ALWAYS_SOFTWARE=1
      - MESA_GL_VERSION_OVERRIDE=3.3
      # CycloneDDS handles TRANSIENT_LOCAL (latched) QoS reliably in Docker;
      # FastDDS shared-memory transport breaks robot_description across processes
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      # Use pre-generated URDF — bypasses runtime xacro subprocess issues in Docker
      - SO101_URDF_FILE=/ros2_ws/so101_follower_real.urdf
    volumes:
      # X11 for RViz
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      # Calibration file — wrapped with "joints:" map required by feetech_ros2_driver
      # (papu.json is the lerobot flat format; papu_ros2.json adds the top-level wrapper)
      - ${HOME}/.cache/huggingface/lerobot/calibration/robots/so_follower/papu_ros2.json:/calibration/papu.json:ro
    devices:
      # Real Feetech arm — symlinks don't work in Docker, pass the real device
      - /dev/ttyACM0:/dev/ttyACM0
    group_add:
      - dialout
    network_mode: host
    ipc: host
    privileged: false
    command: >
      ros2 launch so101_bringup follower_moveit_demo.launch.py
        hardware_type:=real
        usb_port:=/dev/ttyACM0
        joint_config_file:=/calibration/papu.json
        use_rviz:=true

  # ── Robot arm + blue-object perception with RealSense D435 ─────────────────
  # Run with:  ./run_moveit.sh perception
  #
  # Starts the full robot stack (controllers + MoveIt move_group) alongside the
  # RealSense D435 driver and the blue-object detector.  A single RViz window
  # shows the robot model and the detected-object marker in the same scene.
  perception:
    build:
      context: .
      dockerfile: Dockerfile.moveit
    image: so101-moveit:latest
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - LIBGL_ALWAYS_SOFTWARE=1
      - MESA_GL_VERSION_OVERRIDE=3.3
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - SO101_URDF_FILE=/ros2_ws/so101_follower_real.urdf
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${HOME}/.cache/huggingface/lerobot/calibration/robots/so_follower/papu_ros2.json:/calibration/papu.json:ro
    devices:
      - /dev/ttyACM0:/dev/ttyACM0
    # RealSense D435 is a USB3 device — privileged lets the driver enumerate it.
    # For production use device_cgroup_rules instead.
    privileged: true
    group_add:
      - dialout
    network_mode: host
    ipc: host
    command: >
      ros2 launch so101_perception perception_with_robot.launch.py
        hardware_type:=real
        usb_port:=/dev/ttyACM0
        joint_config_file:=/calibration/papu.json
        use_rviz:=true
