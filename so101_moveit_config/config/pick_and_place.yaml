# Runtime parameters for the sort_by_class node.
#
# - class_to_zone maps the label published by object_classifier
#   (see so101_perception/config/objects_hsv.yaml) to a drop-off zone name
#   ("zone_a" = pink, "zone_b" = orange).
# - Heights are in metres above the detected centroid.
# - Stability gates require N consecutive samples within a small radius
#   before the script trusts a detection.

sort_by_class:
  ros__parameters:

    # ── Detection topics ──────────────────────────────────────────────────
    object_label_topic: "/object_classifier/detected_label"
    object_point_topic: "/object_classifier/detected_point"
    zone_a_topic:       "/zone_detector/zone_a"
    zone_b_topic:       "/zone_detector/zone_b"

    # ── Class → zone mapping ──────────────────────────────────────────────
    # ROS 2 parameters can't be dicts, so this is a flat list of
    # "label:zone" strings.  Edit freely as new objects are calibrated.
    # Any label not listed here is skipped.
    class_to_zone:
      - "red_heart_bear:zone_a"
      - "blue_dragon:zone_b"

    # ── Stability gates ───────────────────────────────────────────────────
    object_samples_required: 10
    object_stability_radius_m: 0.01
    object_detection_timeout_s: 300.0

    zone_samples_required: 5
    zone_stability_radius_m: 0.02
    zone_detection_timeout_s: 15.0

    # Window (s) within which a `detected_point` is considered to belong to
    # the most recently received `detected_label`.  Guards against the
    # cross-topic race between String and PointStamped.
    label_point_window_s: 0.15

    # ── Pick geometry (relative to the object centroid) ───────────────────
    # Small offsets to nudge the grasp away from systematic camera bias.
    # Positive X pushes the target *forward* (away from the arm base).
    pick_x_offset_m:    0.0
    pick_y_offset_m:    0.0
    pick_z_offset_m:    -0.07    # depth of the final grasp (only applied at descent)
    # Hover height during tracking AND the approach pose above the pick.
    # Should clear the object's top — the bear is ~11 cm tall, so 0.10 m
    # of clearance over the centroid (which sits ~5–6 cm above the table)
    # is a safe default.
    approach_height_m:  0.10
    # Match approach_height so the LIN retreat ends exactly where the approach
    # started — that pose is already IK-validated.  Raising it further can
    # cross an IK singularity on the 5-DOF SO-101.
    retreat_height_m:   0.05

    # ── Place geometry (relative to the zone centroid) ────────────────────
    # Drop the object slightly above the sheet to avoid plowing.
    # Same logic as pick: keep approach = retreat AND keep the absolute Z low
    # — Z ~0.08 in base_link is comfortably inside the SO-101 workspace,
    # whereas Z ~0.11 hits an IK singularity for off-axis yaws.
    place_z_offset_m:   0.03
    place_approach_height_m: 0.03
    place_retreat_height_m:  0.03

    # Hardcoded XYZ override (in base_link).  When all three are non-zero
    # the perception centroid is REPLACED by this point — useful to test
    # the motion pipeline without depending on camera calibration.
    # Set back to [0.0, 0.0, 0.0] to use perception again.
    # Known-reachable: x=0.20 m radial, y=0, z=0.05 m above base_link.
    test_pick_xyz: [0.0, 0.0, 0.0]

    # ── track_and_pick (visual-servoing orchestrator) ───────────────────
    # Pickable workspace in base_link.  Detections outside this annulus
    # are tracked (gripper hovers above them) but a pick is never
    # triggered.  Tune to your physical reachable envelope.
    pick_zone_radius_min_m: 0.10
    pick_zone_radius_max_m: 0.27
    pick_zone_z_min_m:     -0.05
    pick_zone_z_max_m:      0.20
    # Object must stay within `stability_radius_m` for `stability_seconds`
    # before track_and_pick advances from TRACKING to PICK.
    stability_radius_m:  0.01
    stability_seconds:   1.5
    # Servo loop rate and time budgets for the pick sub-states.
    servo_rate_hz:       30.0
    descend_time_s:      1.5
    retreat_time_s:      1.5
    settle_time_s:       0.5
    detection_freshness_s: 0.5
    # If the detection drops for this long while tracking, abandon the
    # pursuit and return to scan_pose.  Prevents the arm from holding
    # its last hover pose forever when the object disappears.
    lost_detection_timeout_s: 3.0
    # Tracking smoothness — applied to the published servo target.
    # tracking_lpf_alpha: exponential-moving-average coefficient.
    #   0.05 = very slow / very smooth, 1.0 = no filter.
    # tracking_max_speed_m_per_s: hard cap on how fast the reference
    #   slews toward a fresh detection (independent from Placo's joint
    #   speed limits, which still bound the *actual* arm motion).
    tracking_lpf_alpha:           0.05
    tracking_max_speed_m_per_s:   0.05
    # Which labels to track (empty list => any label except "none").
    accept_labels: ["red_heart_bear", "blue_dragon"]
