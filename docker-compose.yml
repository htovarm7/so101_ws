services:

  # ── MoveIt + real arm (no camera) ─────────────────────────────────────────
  # docker compose up moveit
  moveit:
    build:
      context: .
      dockerfile: Dockerfile.moveit
    image: so101-moveit:latest
    runtime: nvidia
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - QT_QPA_PLATFORM=xcb
      # GPU-accelerated RViz: feed OpenGL through the host's NVIDIA driver.
      # NVIDIA_DRIVER_CAPABILITIES must include 'graphics' (and 'display') —
      # the default 'utility' alone does not expose libGL.
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=graphics,utility,display,video,compute
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - SO101_URDF_FILE=/ros2_ws/so101_follower_real.urdf
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ./papu_ros2.json:/calibration/papu.json:ro
    devices:
      - /dev/ttyACM0:/dev/ttyACM0
    group_add:
      - dialout
    network_mode: host
    ipc: host
    privileged: false
    command: >
      ros2 launch so101_bringup follower_moveit_demo.launch.py
        hardware_type:=real
        usb_port:=/dev/ttyACM0
        joint_config_file:=/calibration/papu.json
        use_rviz:=true

  # ── MoveIt + real arm + RealSense D435 + blue-object detector ─────────────
  # docker compose up perception
  perception:
    build:
      context: .
      dockerfile: Dockerfile.moveit
    image: so101-moveit:latest
    runtime: nvidia
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - QT_QPA_PLATFORM=xcb
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=graphics,utility,display,video,compute
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - SO101_URDF_FILE=/ros2_ws/so101_follower_real.urdf
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ./papu_ros2.json:/calibration/papu.json:ro
    devices:
      - /dev/ttyACM0:/dev/ttyACM0
    group_add:
      - dialout
    network_mode: host
    ipc: host
    privileged: true
    command: >
      ros2 launch so101_perception perception_with_robot.launch.py
        hardware_type:=real
        usb_port:=/dev/ttyACM0
        joint_config_file:=/calibration/papu.json
        start_rviz:=true

  # ── RealSense D435 + blue-object detector only (no arm required) ───────────
  # docker compose up perception-only
  perception-only:
    build:
      context: .
      dockerfile: Dockerfile.moveit
    image: so101-moveit:latest
    runtime: nvidia
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - QT_QPA_PLATFORM=xcb
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=graphics,utility,display,video,compute
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /dev:/dev
      - ./:/ros2_ws/src/so101_ros:rw
    network_mode: host
    ipc: host
    privileged: true
    command: >
      ros2 launch so101_perception blue_detector.launch.py
        use_rviz:=true

  # ── MoveIt + arm + RealSense + object/zone detection + pick-and-place ────
  # docker compose up pick-and-place
  pick-and-place:
    build:
      context: .
      dockerfile: Dockerfile.moveit
    image: so101-moveit:latest
    runtime: nvidia
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - QT_QPA_PLATFORM=xcb
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=graphics,utility,display,video,compute
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - SO101_URDF_FILE=/ros2_ws/so101_follower_real.urdf
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ./papu_ros2.json:/calibration/papu.json:ro
      # Mount config files so they can be tuned without a docker rebuild.
      # Edit the host file, restart the service, and the new values are used.
      - ./so101_moveit_config/config/pick_and_place.yaml:/ros2_ws/install/so101_moveit_config/share/so101_moveit_config/config/pick_and_place.yaml:ro
      - ./so101_perception/config/objects_hsv.yaml:/ros2_ws/install/so101_perception/share/so101_perception/config/objects_hsv.yaml:ro
      - ./so101_perception/config/zones_hsv.yaml:/ros2_ws/install/so101_perception/share/so101_perception/config/zones_hsv.yaml:ro
    devices:
      - /dev/ttyACM0:/dev/ttyACM0
    group_add:
      - dialout
    network_mode: host
    ipc: host
    privileged: true
    command: >
      ros2 launch so101_bringup pick_and_place.launch.py
        hardware_type:=real
        usb_port:=/dev/ttyACM0
        joint_config_file:=/calibration/papu.json
        use_rviz:=true

  # ── Interactive shell inside the container ─────────────────────────────────
  # docker compose run --rm shell
  shell:
    build:
      context: .
      dockerfile: Dockerfile.moveit
    image: so101-moveit:latest
    runtime: nvidia
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - QT_QPA_PLATFORM=xcb
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=graphics,utility,display,video,compute
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - SO101_URDF_FILE=/ros2_ws/so101_follower_real.urdf
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ./papu_ros2.json:/calibration/papu.json:ro
    devices:
      - /dev/ttyACM0:/dev/ttyACM0
    group_add:
      - dialout
    network_mode: host
    ipc: host
    privileged: false
    stdin_open: true
    tty: true
    command: bash
